[dependencies]
sekirei-core = { path = "../sekirei-core", version = "0.2.3" }
rayon = "1"
lineprior = { git = "https://github.com/kent-tokyo/lineprior", rev = "dcfca91f902ec269b7a518ec0c3a48d079a0406c" }
